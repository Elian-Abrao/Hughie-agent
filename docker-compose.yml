services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hughie
      POSTGRES_PASSWORD: hughie
      POSTGRES_DB: hughie
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hughie"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
