name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ./providers/codex-bridge-sdk
          pip install ".[serve]"
          pip install pytest

      - name: Run unit tests
        run: pytest tests/unit -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  publish-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute image coordinates
        id: vars
        run: |
          REPO_LOWER="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image_namespace=${REGISTRY}/${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push broker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./providers/llm-broker/Dockerfile.ci
          push: true
          tags: |
            ${{ steps.vars.outputs.image_namespace }}/broker:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_namespace }}/broker:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image_namespace }}/hughie:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_namespace }}/hughie:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile.ci
          push: true
          tags: |
            ${{ steps.vars.outputs.image_namespace }}/frontend:${{ steps.vars.outputs.image_tag }}
            ${{ steps.vars.outputs.image_namespace }}/frontend:latest

  deploy-production:
    name: Deploy to Production
    runs-on:
      - self-hosted
      - Linux
      - X64
      - home-server
    needs: publish-images
    environment:
      name: production

    steps:
      - name: Run production deploy
        env:
          PROD_APP_DIR: ${{ secrets.PROD_APP_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_NAMESPACE: ${{ needs.publish-images.outputs.image_namespace }}
          IMAGE_TAG: ${{ needs.publish-images.outputs.image_tag }}
        run: |
          cd "${PROD_APP_DIR}"
          git pull --ff-only origin main
          chmod +x scripts/deploy-prod.sh
          SKIP_GIT_PULL=1 \
          IMAGE_NAMESPACE="${IMAGE_NAMESPACE}" \
          IMAGE_TAG="${IMAGE_TAG}" \
          GHCR_USERNAME="${GHCR_USERNAME}" \
          GHCR_TOKEN="${GHCR_TOKEN}" \
          ./scripts/deploy-prod.sh
