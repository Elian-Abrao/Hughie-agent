<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hughie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #e8e8e8;
      --muted: #6b6b6b;
      --accent: #7c6af7;
      --accent-dim: #3d3465;
      --user-bg: #1e2d1e;
      --user-border: #2d4a2d;
      --error: #c0392b;
      --tool-bg: #1a1a2e;
      --tool-text: #8888cc;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    .session-badge {
      font-size: 12px;
      color: var(--muted);
      font-family: monospace;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online { background: #27ae60; }
    .status-dot.typing { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      padding: 6px 20px;
      gap: 12px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
    }

    .avatar.user { background: var(--user-border); color: #7ecb7e; }
    .avatar.assistant { background: var(--accent-dim); color: var(--accent); }
    .avatar.assistant img {
      width: 22px;
      height: 22px;
      object-fit: contain;
      display: block;
    }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: 12px 4px 12px 12px;
    }

    .assistant .bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px;
    }

    .bubble.streaming::after {
      content: "▋";
      animation: blink 0.8s step-start infinite;
      color: var(--accent);
      margin-left: 1px;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .tool-indicator {
      font-size: 12px;
      color: var(--tool-text);
      background: var(--tool-bg);
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 4px 10px;
      margin-top: 6px;
      font-family: monospace;
      display: inline-block;
    }

    .tool-indicator::before { content: "⚙ "; }

    /* ── Input ── */
    #input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 20px;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14.5px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 180px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      margin-top: 80px;
      font-size: 15px;
    }
    .empty-state .big { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { max-width: 320px; margin: 0 auto; line-height: 1.6; }
  </style>
</head>
<body>

<header>
  <span class="logo">Hughie</span>
  <span class="session-badge" id="session-label">—</span>
  <div class="status-dot" id="status-dot"></div>
</header>

<div id="messages">
  <div class="empty-state" id="empty">
    <div class="big">🤖</div>
    <p>Olá! Eu sou o Hughie, seu agente pessoal. Como posso ajudar?</p>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea
      id="input"
      rows="1"
      placeholder="Mensagem…"
      autocomplete="off"
      spellcheck="false"
    ></textarea>
    <button id="send-btn" title="Enviar (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

  // ── Session ───────────────────────────────────────────────────
  let sessionId = localStorage.getItem("hughie_session") || "";

  function setSession(id) {
    sessionId = id;
    localStorage.setItem("hughie_session", id);
    document.getElementById("session-label").textContent = "sess: " + id.slice(0, 12);
  }

  if (sessionId) setSession(sessionId);

  // ── DOM helpers ───────────────────────────────────────────────
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("input");
  const sendBtn    = document.getElementById("send-btn");
  const emptyEl    = document.getElementById("empty");
  const statusDot  = document.getElementById("status-dot");

  function setStatus(s) {
    statusDot.className = "status-dot " + s;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(role, text) {
    emptyEl && (emptyEl.style.display = "none");

    const row = document.createElement("div");
    row.className = "msg-row " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar " + role;
    if (role === "user") {
      avatar.textContent = "E";
    } else {
      const img = document.createElement("img");
      img.src = HUGHIE_AVATAR;
      img.alt = "Hughie";
      avatar.appendChild(img);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return bubble;
  }

  function addToolIndicator(bubble, toolName) {
    const el = document.createElement("div");
    el.className = "tool-indicator";
    el.textContent = toolName;
    // insert before the bubble's text node, after bubble content
    bubble.parentElement.insertBefore(el, bubble.nextSibling);
  }

  // ── Auto-resize textarea ──────────────────────────────────────
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + "px";
  });

  // ── Send ──────────────────────────────────────────────────────
  async function send() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;
    setStatus("typing");

    appendMessage("user", text);

    const bubble = appendMessage("assistant", "");
    bubble.classList.add("streaming");

    let toolsRow = null;

    try {
      const res = await fetch(API + "/v1/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop(); // keep incomplete line

        let event = null;
        for (const line of lines) {
          if (line.startsWith("event: ")) {
            event = line.slice(7).trim();
          } else if (line.startsWith("data: ")) {
            const raw = line.slice(6).trim();
            if (!raw || raw === "[DONE]") continue;
            try {
              const payload = JSON.parse(raw);

              if (event === "session" && payload.session_id) {
                setSession(payload.session_id);
              } else if (event === "text" && payload.text) {
                bubble.textContent += payload.text;
                scrollBottom();
              } else if (event === "tool" && payload.tool) {
                addToolIndicator(bubble, payload.tool + "…");
              } else if (event === "error") {
                bubble.textContent = "Erro: " + (payload.error || "desconhecido");
                bubble.style.color = "var(--error)";
              }
            } catch {}
            event = null;
          }
        }
      }
    } catch (err) {
      bubble.textContent = "Falha na conexão: " + err.message;
      bubble.style.color = "var(--error)";
    }

    bubble.classList.remove("streaming");
    sendBtn.disabled = false;
    setStatus("online");
    inputEl.focus();
  }

  sendBtn.addEventListener("click", send);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // ── Health check ──────────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(API + "/health");
      setStatus(r.ok ? "online" : "");
    } catch {
      setStatus("");
    }
  }

  checkHealth();
  setInterval(checkHealth, 30_000);
</script>
</body>
</html>
